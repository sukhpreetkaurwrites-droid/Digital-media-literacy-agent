services:
  - type: web
    name: satya-check-fact-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-5
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /healthz
