<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DigiLit AI — Media & Information Literacy Assistant</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #111827;
    --accent: #2dd4bf;
    --accent-dark: #0f766e;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --bubble-user: #1e293b;
    --bubble-bot: #0b3b3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #0f172a, #0b1120);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 24px;
    border-bottom: 1px solid #1f2937;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #06231f;
  }
  header h1 { font-size: 18px; margin: 0; }
  header p { margin: 0; color: var(--muted); font-size: 12px; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .msg { margin-bottom: 16px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    max-width: 75%;
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 14.5px;
  }
  .user .bubble { background: var(--bubble-user); border-bottom-right-radius: 4px; }
  .bot .bubble { background: var(--bubble-bot); border-bottom-left-radius: 4px; }
  .bot .bubble::before {
    content: "DigiLit AI";
    display: block;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
    font-weight: 600;
  }

  form {
    max-width: 820px;
    margin: 0 auto 20px auto;
    width: 100%;
    display: flex;
    gap: 10px;
    padding: 0 24px;
  }
  textarea {
    flex: 1;
    resize: none;
    border-radius: 12px;
    border: 1px solid #1f2937;
    background: var(--panel);
    color: var(--text);
    padding: 12px 14px;
    font-size: 14.5px;
    font-family: inherit;
    height: 52px;
  }
  button {
    background: var(--accent);
    color: #06231f;
    border: none;
    border-radius: 12px;
    padding: 0 20px;
    font-weight: 700;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .hint { color: var(--muted); font-size: 12px; text-align: center; padding-bottom: 10px; }
</style>
</head>
<body>
  <header>
    <div class="logo">DL</div>
    <div>
      <h1>DigiLit AI</h1>
      <p>Media & Information Literacy Assistant</p>
    </div>
  </header>

  <div id="chat"></div>
  <p class="hint">Ask about fact-checking, spotting misinformation, digital safety, or creating responsible content.</p>

  <form id="chat-form">
    <textarea id="input" placeholder="Ask DigiLit AI something..." required></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>

<script>
  const chatEl = document.getElementById("chat");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  let history = [];

  function addMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + (role === "user" ? "user" : "bot");
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  addMessage("assistant",
    "Hi! I'm DigiLit AI. I can help you evaluate sources, spot misinformation, " +
    "stay safe online, and create responsible digital content. What would you like to explore?");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage("user", message);
    input.value = "";
    sendBtn.disabled = true;
    const thinkingBubble = addMessage("assistant", "Thinking...");

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Request failed");

      thinkingBubble.textContent = data.reply;
      history.push({ role: "user", content: message });
      history.push({ role: "assistant", content: data.reply });
    } catch (err) {
      thinkingBubble.textContent = "Error: " + err.message;
    } finally {
      sendBtn.disabled = false;
    }
  });
</script>
</body>
</html>
